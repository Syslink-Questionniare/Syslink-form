<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>SYSLINK · Smart Building Requirements Survey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EAEFF4; --panel:#FFFFFF; --panel-2:#F6F9FC;
  --ink:#0E2336; --ink-soft:#46596B; --muted:#8295A6;
  --line:#DBE3EC; --line-strong:#C2D0DC;
  --brand:#1E6FE0; --brand-press:#1559B8; --brand-tint:#E9F1FD;
  --ok:#0E9E78; --ok-tint:#E1F4EE;
  --amber:#C9821B; --danger:#D24545; --danger-tint:#FBEBEB;
  --font:'IBM Plex Sans Thai','IBM Plex Sans',system-ui,-apple-system,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --r:14px; --r-sm:10px;
  --shadow:0 1px 2px rgba(14,35,54,.05),0 8px 28px rgba(14,35,54,.06);
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(1200px 600px at 100% -10%, #F2F6FA 0%, transparent 60%),
    var(--bg);
  color:var(--ink); font-family:var(--font); font-size:15px; line-height:1.5;
  -webkit-font-smoothing:antialiased; -webkit-tap-highlight-color:transparent;
}
.wrap{max-width:1160px;margin:0 auto;padding:28px 20px 64px}

/* Header */
.masthead{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px}
.brand{display:flex;align-items:center;gap:12px}
.logo{
  width:40px;height:40px;border-radius:11px;display:grid;place-items:center;
  background:linear-gradient(150deg,var(--brand),#3F8BF0);color:#fff;
  box-shadow:0 6px 16px rgba(30,111,224,.35); flex:0 0 auto;
}
.logo svg{width:22px;height:22px}
.brand b{font-size:19px;letter-spacing:.5px;font-weight:700}
.brand .tag{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.mast-meta{font-size:11.5px;color:var(--muted);text-align:right;letter-spacing:.4px;line-height:1.45}
.mast-meta b{color:var(--ink-soft);font-weight:600;letter-spacing:.6px}

/* Layout */
.shell{display:grid;grid-template-columns:248px 1fr;gap:22px;align-items:start}

/* Rail */
.rail{position:sticky;top:20px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:18px 16px}
.rail h4{margin:0 0 14px;font-family:var(--mono);font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);font-weight:600}
.rail ol{list-style:none;margin:0;padding:0;position:relative}
.rail ol::before{content:"";position:absolute;left:13px;top:8px;bottom:8px;width:2px;background:var(--line);border-radius:2px}
.step{display:flex;gap:11px;align-items:flex-start;padding:7px 0;cursor:pointer;position:relative}
.step .dot{flex:0 0 auto;width:28px;height:28px;border-radius:50%;background:var(--panel);border:2px solid var(--line-strong);
  display:grid;place-items:center;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--muted);z-index:1;transition:.2s}
.step .lbl{padding-top:3px}
.step .lbl .t{font-size:13.5px;font-weight:500;color:var(--ink-soft);line-height:1.25}
.step .lbl .s{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.6px}
.step.active .dot{border-color:var(--brand);color:var(--brand);background:var(--brand-tint)}
.step.active .lbl .t{color:var(--ink);font-weight:600}
.step.done .dot{background:var(--brand);border-color:var(--brand);color:#fff}
.step:hover .lbl .t{color:var(--ink)}
.rail-now{display:none;margin-bottom:12px}
.rail-now .ns{font-family:var(--mono);font-size:11px;color:var(--brand);font-weight:600;letter-spacing:1px}
.rail-now .nt{font-size:16px;font-weight:700;margin-top:2px;line-height:1.25}
.progress{margin-top:16px}
.progress .bar{height:6px;border-radius:6px;background:var(--line);overflow:hidden}
.progress .fill{height:100%;background:linear-gradient(90deg,var(--brand),#54A0FF);width:0;transition:width .4s ease}
.progress .pct{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:6px;letter-spacing:.5px}

/* Card / stage */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.card-head{padding:22px 26px 18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fff,#FBFCFE)}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--brand);font-weight:600;display:flex;align-items:center;gap:8px}
.eyebrow::before{content:"";width:18px;height:2px;background:var(--brand);display:inline-block}
.card-head h2{margin:9px 0 4px;font-size:22px;font-weight:700;letter-spacing:-.2px}
.card-head p{margin:0;color:var(--ink-soft);font-size:14px}
.stage-anim{animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){.stage-anim{animation:none}.progress .fill{transition:none}}
.card-body{padding:24px 26px}

/* Fields */
.grid{display:grid;gap:16px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.field label{display:block;margin-bottom:7px}
.field .lab{font-size:14px;font-weight:600;color:var(--ink)}
.field .lab .req{color:var(--danger);margin-left:3px}
.field .sub{font-size:12.5px;color:var(--muted);font-weight:400}
input[type=text],input[type=tel],input[type=email],input[type=number],textarea,select{
  width:100%;padding:12px 13px;border:1.5px solid var(--line-strong);border-radius:var(--r-sm);
  font-family:var(--font);font-size:16px;color:var(--ink);background:var(--panel-2);transition:border .15s,box-shadow .15s,background .15s;
  outline:none;-webkit-appearance:none;appearance:none}
textarea{resize:vertical;min-height:88px}
input:focus,textarea:focus,select:focus{border-color:var(--brand);background:#fff;box-shadow:0 0 0 4px var(--brand-tint)}
input.err{border-color:var(--danger);background:var(--danger-tint)}

/* chips */
.chips{display:flex;flex-wrap:wrap;gap:9px}
.chip{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border:1.5px solid var(--line-strong);
  border-radius:999px;background:var(--panel-2);cursor:pointer;font-size:14px;color:var(--ink-soft);transition:.15s;user-select:none;min-height:42px}
.chip .en{font-size:12px;color:var(--muted)}
.chip:hover{border-color:var(--brand);color:var(--ink)}
.chip.on{background:var(--brand-tint);border-color:var(--brand);color:var(--brand-press);font-weight:600}
.chip.on .en{color:var(--brand)}
.chip .tick{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--line-strong);display:grid;place-items:center;font-size:9px;flex:0 0 auto}
.chip.on .tick{background:var(--brand);border-color:var(--brand);color:#fff}

/* selectable system cards */
.groupblk{margin-bottom:26px}
.groupblk:last-child{margin-bottom:0}
.group-h{display:flex;align-items:center;gap:10px;margin-bottom:13px}
.group-h .code{font-family:var(--mono);font-size:11px;font-weight:600;color:#fff;background:var(--ink);padding:3px 9px;border-radius:6px;letter-spacing:1px;flex:0 0 auto}
.group-h .nm{font-weight:700;font-size:16px}
.group-h .nm small{color:var(--muted);font-weight:500;font-size:12px;margin-left:6px}
.syscards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.syscard{position:relative;border:1.5px solid var(--line-strong);border-radius:var(--r-sm);padding:15px 15px 15px 17px;
  cursor:pointer;background:var(--panel-2);transition:.18s;overflow:hidden}
.syscard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:transparent;transition:.18s}
.syscard:hover{border-color:var(--brand);transform:translateY(-2px);box-shadow:0 8px 20px rgba(30,111,224,.1)}
.syscard.on{border-color:var(--brand);background:#fff}
.syscard.on::before{background:var(--brand)}
.syscard .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.syscard .ico{width:34px;height:34px;border-radius:9px;background:var(--brand-tint);color:var(--brand);display:grid;place-items:center}
.syscard.on .ico{background:var(--brand);color:#fff}
.syscard .ico svg{width:19px;height:19px}
.syscard .box{width:22px;height:22px;border-radius:6px;border:2px solid var(--line-strong);display:grid;place-items:center;color:#fff;transition:.18s}
.syscard.on .box{background:var(--brand);border-color:var(--brand)}
.syscard .nm{font-weight:600;font-size:14.5px;line-height:1.3}
.syscard .nm small{display:block;font-size:11.5px;color:var(--muted);font-weight:400;margin-top:2px}

/* detail block */
.detail{border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:18px;overflow:hidden}
.detail:last-child{margin-bottom:0}
.detail-h{display:flex;align-items:center;gap:10px;padding:13px 16px;background:var(--panel-2);border-bottom:1px solid var(--line)}
.detail-h .ico{width:30px;height:30px;border-radius:8px;background:var(--brand);color:#fff;display:grid;place-items:center;flex:0 0 auto}
.detail-h .ico svg{width:17px;height:17px}
.detail-h .t{font-weight:700;font-size:15px}
.detail-h .c{font-family:var(--mono);font-size:10px;color:var(--muted);margin-left:auto;letter-spacing:1px}
.detail-body{padding:16px}

/* matrix */
.matrix{border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden}
.mrow{display:grid;grid-template-columns:1.3fr 1.4fr 1.1fr;gap:0;border-bottom:1px solid var(--line)}
.mrow:last-child{border-bottom:none}
.mrow.head{background:var(--ink);color:#fff;font-family:var(--mono);font-size:11px;letter-spacing:.5px;text-transform:uppercase}
.mcell{padding:11px 13px;display:flex;align-items:center;border-right:1px solid var(--line)}
.mrow.head .mcell{border-right-color:rgba(255,255,255,.12)}
.mcell:last-child{border-right:none}
.mcell .nm{font-weight:600;font-size:13.5px}
.mcell .nm .th{display:block;font-weight:400;font-size:11.5px;color:var(--muted);margin-top:1px}
.mcell input{padding:9px 10px;font-size:14px}
.mini-chips{display:flex;gap:6px;flex-wrap:wrap}
.mini{padding:7px 11px;border:1.4px solid var(--line-strong);border-radius:999px;font-size:12.5px;cursor:pointer;background:#fff;color:var(--ink-soft);transition:.15s}
.mini.on{background:var(--ok-tint);border-color:var(--ok);color:#0a6e54;font-weight:600}
.mini.blue.on{background:var(--brand-tint);border-color:var(--brand);color:var(--brand-press)}
.mini.no.on{background:var(--danger-tint);border-color:var(--danger);color:#a52f2f}

/* review */
.review-grp{margin-bottom:20px}
.review-grp h3{font-size:13px;font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;color:var(--brand);margin:0 0 10px;font-weight:600}
.rrow{display:flex;gap:12px;padding:9px 0;border-bottom:1px dashed var(--line);font-size:14px}
.rrow .k{flex:0 0 42%;color:var(--ink-soft)}
.rrow .v{font-weight:600;color:var(--ink);min-width:0;word-break:break-word}
.rrow .v.empty{font-weight:400;color:var(--muted);font-style:italic}
.ticket{background:var(--ink);color:#fff;border-radius:var(--r-sm);padding:18px 20px;margin-bottom:22px;position:relative;overflow:hidden}
.ticket::after{content:"";position:absolute;right:-30px;top:-30px;width:140px;height:140px;border:14px solid rgba(255,255,255,.05);border-radius:50%}
.ticket .lab{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;color:#7FB3F0;text-transform:uppercase}
.ticket .big{font-size:20px;font-weight:700;margin:5px 0}
.ticket .meta{font-family:var(--mono);font-size:12px;color:#A9C4E5}

/* nav */
.actions{display:flex;align-items:center;gap:12px;padding:18px 26px;border-top:1px solid var(--line);background:var(--panel-2);flex-wrap:wrap}
.spacer{flex:1}
.btn{padding:13px 22px;border-radius:var(--r-sm);font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:.15s;display:inline-flex;align-items:center;gap:8px;min-height:48px}
.btn:focus-visible{outline:3px solid var(--brand-tint);outline-offset:2px}
.btn.ghost{background:#fff;border-color:var(--line-strong);color:var(--ink-soft)}
.btn.ghost:hover{border-color:var(--brand);color:var(--brand)}
.btn.primary{background:var(--brand);color:#fff;box-shadow:0 6px 16px rgba(30,111,224,.3)}
.btn.primary:hover{background:var(--brand-press)}
.btn.primary:disabled{opacity:.55;cursor:not-allowed;box-shadow:none}
.btn.ok{background:var(--ok);color:#fff}
.note{font-size:12.5px;color:var(--muted);font-family:var(--mono)}

/* banners */
.banner{padding:12px 15px;border-radius:var(--r-sm);font-size:14px;margin-bottom:16px;display:flex;gap:10px;align-items:flex-start}
.banner.warn{background:#FFF6E6;border:1px solid #F0D699;color:#8A5E12}
.banner.ok{background:var(--ok-tint);border:1px solid #9CD9C5;color:#0a6e54}
.banner.err{background:var(--danger-tint);border:1px solid #EBB4B4;color:#a52f2f}
.banner b{font-weight:700}
.banner code{font-family:var(--mono);font-size:12px;background:rgba(0,0,0,.06);padding:1px 5px;border-radius:4px}

.hidden{display:none!important}
.donewrap{text-align:center;padding:44px 20px}
.donewrap .circle{width:78px;height:78px;border-radius:50%;background:var(--ok-tint);color:var(--ok);display:grid;place-items:center;margin:0 auto 18px}
.donewrap .circle svg{width:38px;height:38px}
.donewrap h2{margin:0 0 8px;font-size:24px}
.donewrap p{color:var(--ink-soft);max-width:460px;margin:0 auto 22px}
.dl-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.foot-credit{text-align:center;margin-top:26px;font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.5px}

/* ---------- Responsive: tablet & mobile ---------- */
@media(max-width:860px){
  .shell{grid-template-columns:1fr;gap:16px}
  .rail{position:static;padding:14px 16px}
  .rail h4,.rail ol{display:none}
  .rail-now{display:block}
  .g3{grid-template-columns:1fr 1fr}
}
@media(max-width:680px){
  .g2,.g3{grid-template-columns:1fr}
  .mrow{grid-template-columns:1fr}
  .mcell{border-right:none;border-bottom:1px solid var(--line)}
  .mcell:last-child{border-bottom:none}
}
@media(max-width:560px){
  .wrap{padding:18px 12px 48px}
  .masthead{flex-direction:column;align-items:flex-start;gap:10px;margin-bottom:16px}
  .mast-meta{text-align:left}
  .card-head{padding:18px 16px 14px}
  .card-head h2{font-size:19px}
  .card-body{padding:18px 16px}
  .actions{padding:14px 16px}
  .actions .note{order:3;flex-basis:100%}
  .btn{flex:1 1 auto;justify-content:center}
  .syscards{grid-template-columns:1fr}
  .rrow{flex-direction:column;gap:2px}
  .rrow .k{flex-basis:auto}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="masthead">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h4l2-5 3 10 2-5h3"/></svg>
      </div>
      <div>
        <b>SYSLINK</b>
        <div class="tag">Smart Building Solutions</div>
      </div>
    </div>
    <div class="mast-meta">
      <b>SYSTEM REQUIREMENTS SURVEY</b><br>แบบสำรวจความต้องการระบบ
    </div>
  </div>

  <div class="shell">
    <aside class="rail">
      <h4>STEPS / ขั้นตอน</h4>
      <ol id="rail"></ol>
      <div class="rail-now" id="railNow"></div>
      <div class="progress">
        <div class="bar"><div class="fill" id="fill"></div></div>
        <div class="pct" id="pct">0%</div>
      </div>
    </aside>

    <main class="card">
      <div class="card-head">
        <div class="eyebrow" id="eyebrow">STEP</div>
        <h2 id="title">—</h2>
        <p id="subtitle"></p>
      </div>
      <div class="card-body" id="stage"></div>
      <div class="actions" id="actions">
        <button class="btn ghost" id="backBtn">← Back</button>
        <span class="note" id="footnote"></span>
        <span class="spacer"></span>
        <button class="btn primary" id="nextBtn">Next →</button>
      </div>
    </main>
  </div>

  <div class="foot-credit">SYSLINK · REQUIREMENTS INTAKE · v1.1</div>
</div>

<script>
/* =========================================================================
   CONFIG — paste your Google Apps Script Web App URL here (see Code.gs / SETUP)
   ========================================================================= */
const CONFIG = {
  webAppUrl: "https://script.google.com/macros/s/AKfycbz8PduDSSeqf-3JKijYg5bIWXxnPUlH_vPekRf-7sEy8M3CVjG3YMpe6YsQRmt_sCCV/exec",   // e.g. "https://script.google.com/macros/s/AKfy.../exec"
  company: "SYSLINK"
};

/* ---- ICONS ---- */
const I = {
  bulb:'<path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12c.6.6 1 1.4 1 2v0h6v0c0-.6.4-1.4 1-2A7 7 0 0 0 12 2Z"/>',
  ac:'<rect x="2" y="4" width="20" height="9" rx="2"/><path d="M6 17v1M10 17c0 1.5-1 2-1 3M14 17c0 1.5 1 2 1 3M18 17v1"/>',

};
function svg(p){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'+p+'</svg>';}

/* =========================================================================
   SCHEMA — English primary, Thai secondary. Stored values are English.
   ========================================================================= */
const opt = (en,th)=>({en,th});

const GROUPS = [
  { id:'aut', code:'AUT', en:'Smart Automation', th:'ระบบออโตเมชัน', systems:[
    { id:'lighting', code:'A1', icon:'bulb', en:'Smart Lighting', th:'ระบบควบคุมไฟ', fields:[
        {id:'control', t:'multi', lab:'Control', sub:'การควบคุม', opts:[opt('On/Off','เปิด-ปิด'),opt('Dimmable','หรี่แสง')]},
        {id:'lightType', t:'multi', lab:'Fixture type', sub:'ประเภทหลอดไฟ', opts:[opt('Downlight','ดาวน์ไลท์'),opt('Track','แทร็กไลท์'),opt('Strip','สตริปไลท์'),opt('Bulb','หลอดทั่วไป'),opt('Other','อื่นๆ')]},
        {id:'switch', t:'select', lab:'Switch type', sub:'ประเภทสวิตช์', opts:[opt('Toggle','สวิตช์โยก'),opt('Push','สวิตช์กด')]},
        {id:'points', t:'number', lab:'No. of points', sub:'จำนวนจุด (โดยประมาณ)'}

  GROUPS.forEach(g=>{

  return list;
}

function field(f, keyPrefix){
  const k = keyPrefix? keyPrefix+'.'+f.id : f.id;
  const lab = `<label><span class="lab">${f.lab}${f.req?'<span class="req">*</span>':''}</span> <span class="sub">${f.sub||''}</span></label>`;
  if(['text','tel','email','number'].includes(f.t)){
    const v = get(k)||'';
    const im = f.t==='number'?'numeric':(f.t==='tel'?'tel':(f.t==='email'?'email':'text'));
    return `<div class="field">${lab}<input type="${f.t}" inputmode="${im}" autocomplete="${f.ac||'off'}" data-k="${k}" value="${esc(v)}" placeholder="${f.ph||''}" ${f.t==='number'?'min="0"':''}></div>`;
  }
  if(f.t==='textarea'){
    return `<div class="field">${lab}<textarea data-k="${k}" placeholder="${f.ph||''}">${esc(get(k)||'')}</textarea></div>`;
  }
  if(f.t==='select'||f.t==='multi'){
    const cur = get(k);
    const isOn = (o)=> f.t==='multi' ? (Array.isArray(cur)&&cur.includes(o.en)) : cur===o.en;
    const chips = f.opts.map(o=>`
      <div class="chip ${isOn(o)?'on':''}" data-kind="${f.t}" data-k="${k}" data-v="${esc(o.en)}">
        <span class="tick">${isOn(o)?'✓':''}</span>${o.en}<span class="en">${o.th}</span>
      </div>`).join('');
    return `<div class="field">${lab}<div class="chips">${chips}</div></div>`;
  }
  return '';
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function validateProject(){
  const need = [['company','Company'],['contact','Contact person'],['phone','Phone']];
  const missing = need.filter(([k])=>!(get(k)||'').trim());
  if(missing.length){
    missing.forEach(([k])=>{const el=document.querySelector(`[data-k="${k}"]`);if(el)el.classList.add('err');});
    return 'Please complete required fields / กรุณากรอกข้อมูลที่จำเป็น: '+missing.map(m=>m[1]).join(', ');
  }
  return true;
}

    ${row('Company','company')}${row('Contact','contact')}${row('Phone','phone')}${row('Email','email')}
    ${row('Property type','propertyType')}${row('Status','status')}
    <div class="rrow"><div class="k">Floors / Rooms</div><div class="v">${(v('floors')||'-')} floors · ${(v('rooms')||'-')} rooms</div></div>
    ${row('Location','location')}${row('Timeline','timeline')}
  </div>`;

  html += `<div class="review-grp"><h3>Selected Systems (${selSys.length})</h3>`;
  if(!selSys.length){ html+=`<div class="rrow"><div class="v empty">No systems selected</div></div>`; }
  selSys.forEach(s=>{
    const parts = s.fields.map(f=>{const val=v(s.id+'.'+f.id);return val?`<b>${f.lab}:</b> ${esc(val)}`:null;}).filter(Boolean);
    html += `<div class="rrow"><div class="k">${s.en} <span style="font-family:var(--mono);font-size:10px;color:var(--muted)">${s.code}</span></div>
      <div class="v" style="font-weight:500">${parts.length?parts.join(' · '):'<span style="color:var(--muted);font-style:italic">selected (no extra detail)</span>'}</div></div>`;
  });
  html += `</div>`;

  const docs = v('docs.provide');
  html += `<div class="review-grp"><h3>Documents & Notes</h3>
    <div class="rrow"><div class="k">Documents available</div><div class="v ${docs?'':'empty'}">${docs||'— not specified —'}</div></div>
    ${row('File format','docs.format')}${row('File link','fileLink')}${row('Additional requirements','docs.note')}
  </div>`;

  if(!CONFIG.webAppUrl){
    html += `<div class="banner warn">⚠️ <span><b>Google Sheet not connected.</b> On submit, a summary file will download instead. To save automatically, set <code>CONFIG.webAppUrl</code> (see Code.gs / SETUP). / ยังไม่ได้เชื่อมต่อชีต</span></div>`;
  } else {
    html += `<div class="banner ok">✓ <span>Endpoint connected — press “Submit” to save to Google Sheet / เชื่อมต่อแล้ว</span></div>`;
  }
  return html;
}

/* =========================================================================
   CORE RENDER + NAV
   ========================================================================= */
const $ = s => document.querySelector(s);
function paint(scrollTop){
  STEPS = steps();
  if(state.step>=STEPS.length) state.step = STEPS.length-1;
  const st = STEPS[state.step];

  $('#rail').innerHTML = STEPS.map((s,i)=>`
    <li class="step ${i===state.step?'active':''} ${i<state.step?'done':''}" data-go="${i}">
      <span class="dot">${i<state.step?'✓':i+1}</span>
      <span class="lbl"><span class="t">${s.title.replace(/^Details · /,'')}</span><span class="s">${s.code}</span></span>
    </li>`).join('');
  $('#railNow').innerHTML = `<div class="ns">${st.code}</div><div class="nt">${st.title}</div>`;

  const pct = Math.round((state.step)/(STEPS.length-1)*100);
  $('#fill').style.width = pct+'%'; $('#pct').textContent = pct+'% · Step '+(state.step+1)+'/'+STEPS.length;

  $('#eyebrow').textContent = st.code;
  $('#title').textContent = st.title;
  $('#subtitle').textContent = st.sub;
  const stage = $('#stage');
  stage.classList.remove('stage-anim'); void stage.offsetWidth; stage.classList.add('stage-anim');
  stage.innerHTML = st.render();

  const isLast = state.step===STEPS.length-1;
  $('#backBtn').style.visibility = state.step===0?'hidden':'visible';
  const nb = $('#nextBtn');
  if(isLast){ nb.innerHTML = (CONFIG.webAppUrl?'Submit ➤':'Generate summary ➤'); nb.classList.add('ok'); nb.classList.remove('primary'); }
  else { nb.innerHTML = 'Next →'; nb.classList.add('primary'); nb.classList.remove('ok'); }
  $('#footnote').textContent = st.id==='catalog'? (state.selected.size+' systems selected') : '';
  if(scrollTop) window.scrollTo({top:0,behavior:'smooth'});
}

function go(i){ if(i<0||i>=STEPS.length) return; state.step=i; paint(true); }
function next(){
  const st = STEPS[state.step];
  if(st.validate){ const r=st.validate(); if(r!==true){ banner(r); return; } }
  if(state.step===STEPS.length-1){ submit(); return; }
  go(state.step+1);
}
function banner(msg){
  const old=document.querySelector('.flash'); if(old)old.remove();
  const b=document.createElement('div'); b.className='banner err flash'; b.innerHTML='⚠️ <span>'+msg+'</span>';
  $('#stage').prepend(b); b.scrollIntoView({behavior:'smooth',block:'center'});
}

document.addEventListener('click', e=>{
  const sys = e.target.closest('[data-sys]');
  if(sys){ const y=window.scrollY; const id=sys.dataset.sys; state.selected.has(id)?state.selected.delete(id):state.selected.add(id); paint(false); window.scrollTo(0,y); return; }
  const chip = e.target.closest('[data-kind]');
  if(chip){
    const y=window.scrollY;
    const {kind,k,v}=chip.dataset;
    if(kind==='multi') toggleMulti(k,v);
    else { set(k, get(k)===v?'':v); }
    paint(false); window.scrollTo(0,y); return;
  }
  const goEl = e.target.closest('[data-go]');
  if(goEl){ go(+goEl.dataset.go); return; }
});
document.addEventListener('input', e=>{
  const el=e.target.closest('[data-k]'); if(!el) return;
  if(el.tagName==='INPUT'||el.tagName==='TEXTAREA'){ set(el.dataset.k, el.value); el.classList.remove('err'); }
});
$('#nextBtn').addEventListener('click', next);
$('#backBtn').addEventListener('click', ()=>go(state.step-1));

/* =========================================================================
   SUBMIT
   ========================================================================= */
function buildPayload(){
  const selSys=[]; GROUPS.forEach(g=>g.systems.forEach(s=>{if(state.selected.has(s.id))selSys.push(s.code+' '+s.en);}));
  const flat = {
    _submittedAt: new Date().toISOString(),
    company:get('company')||'', contact:get('contact')||'', phone:get('phone')||'', email:get('email')||'',
    project:get('project')||'', location:get('location')||'',
    propertyType:get('propertyType')||'', status:get('status')||'', star:get('star')||'',
    floors:get('floors')||'', rooms:get('rooms')||'', timeline:get('timeline')||'',
    selectedSystems: selSys.join(' | '),
    docFormat:get('docs.format')||'', docsAvailable:(get('docs.provide')||[]).join(', '),
    fileLink:get('fileLink')||'', additionalNote:get('docs.note')||'', budget:get('docs.budget')||''
  };
  Object.keys(state.a).forEach(k=>{
    if(k.includes('.')){ const v=state.a[k]; flat[k]=Array.isArray(v)?v.join('; '):v; }
  });
  return flat;
}

async function submit(){
  const payload = buildPayload();
  const nb=$('#nextBtn'); nb.disabled=true; nb.textContent='Sending…';
  if(CONFIG.webAppUrl){
    try{
      await fetch(CONFIG.webAppUrl,{
        method:'POST', mode:'no-cors',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify(payload)
      });
      done(true, payload);
    }catch(err){ done(false, payload, err.message); }
  } else {
    done('local', payload);
  }
  nb.disabled=false;
}

function download(payload){
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download='SYSLINK_'+(payload.company||'requirement').replace(/\s+/g,'_')+'_'+Date.now()+'.json';
  document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500);
}
function csvDownload(p){
  const keys=Object.keys(p);
  const esc2=s=>'"'+String(s).replace(/"/g,'""')+'"';
  const csv=keys.map(esc2).join(',')+'\n'+keys.map(k=>esc2(p[k])).join(',');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download='SYSLINK_'+(p.company||'requirement').replace(/\s+/g,'_')+'.csv';
  document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500);
}

function done(success, payload, errMsg){
  $('.card-head').style.display='none'; $('#actions').style.display='none';
  let msg, sub, cls;
  if(success===true){ cls='ok'; msg='Submitted successfully'; sub='Your requirements have been sent to the SYSLINK Solution team. We will get back to you to design the most suitable system. / ส่งข้อมูลให้ทีมงานเรียบร้อยแล้ว'; }
  else if(success==='local'){ cls='ok'; msg='Summary file created'; sub='Google Sheet is not connected yet — a summary file has been downloaded so you can send it to SYSLINK directly. / ยังไม่ได้เชื่อมต่อชีต ไฟล์สรุปถูกดาวน์โหลดแล้ว'; }
  else { cls='err'; msg='Submission failed'; sub='Error: '+(errMsg||'')+' — please download the summary and send it to the team directly. / กรุณาดาวน์โหลดไฟล์สรุปและส่งให้ทีมงาน'; }

  $('#stage').innerHTML = `<div class="donewrap">
    <div class="circle">${svg(cls==='ok'?'<path d="M20 6 9 17l-5-5"/>':'<path d="M18 6 6 18M6 6l12 12"/>')}</div>
    <h2>${msg}</h2><p>${sub}</p>
    <div class="dl-row">
      <button class="btn ghost" id="dlJson">⬇ Download JSON</button>
      <button class="btn ghost" id="dlCsv">⬇ Download CSV</button>
      <button class="btn primary" id="again">+ New entry</button>
    </div>
  </div>`;
  $('#dlJson').onclick=()=>download(payload);
  $('#dlCsv').onclick=()=>csvDownload(payload);
  $('#again').onclick=()=>location.reload();
  if(success==='local') download(payload);
  window.scrollTo({top:0,behavior:'smooth'});
}

paint();
</script>
</body>
</html>
